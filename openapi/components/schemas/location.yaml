# Location Schemas

Location:
  type: object
  required:
    - latitude
    - longitude
  properties:
    latitude:
      type: number
      format: double
      minimum: -90
      maximum: 90
      description: Latitude in decimal degrees
      example: 37.7749
    longitude:
      type: number
      format: double
      minimum: -180
      maximum: 180
      description: Longitude in decimal degrees
      example: -122.4194
    speedKph:
      type: number
      format: double
      minimum: 0
      description: Speed in km/h
      example: 72.7
    heading:
      type: integer
      minimum: 0
      maximum: 360
      description: Heading in degrees (0 = North, 90 = East)
      example: 270
    timestamp:
      type: string
      format: date-time
      description: Time of location reading

LocationHistory:
  type: object
  properties:
    deviceId:
      type: string
    from:
      type: string
      format: date-time
    to:
      type: string
      format: date-time
    locations:
      type: array
      items:
        $ref: '#/Location'
    nextToken:
      type: string
      nullable: true
      description: Token for next page of results (null if no more data)

LatestPosition:
  type: object
  description: |
    Latest known position of a device.
    Note: Movement status (moving/stopped/idle) could be added as a future extension.
  properties:
    deviceId:
      type: string
    position:
      $ref: '#/Location'
    timestamp:
      type: string
      format: date-time
      description: Time of last position update
