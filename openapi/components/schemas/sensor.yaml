# Sensor Schemas

SensorReading:
  type: object
  properties:
    timestamp:
      type: string
      format: date-time
    value:
      type: number
      format: double
    unit:
      type: string
      description: Unit of measurement
      example: percent

SensorHistory:
  type: object
  properties:
    deviceId:
      type: string
    from:
      type: string
      format: date-time
    to:
      type: string
      format: date-time
    sensors:
      type: object
      description: Map of metric name to array of readings
      additionalProperties:
        type: array
        items:
          $ref: '#/SensorReading'
